<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1140" viewBox="0 0 1700 1140" role="img" aria-labelledby="title desc">
  <title id="title">JobFinder Data Storage Map</title>
  <desc id="desc">Detailed schema and filesystem map for JobFinder including table roles, relationships, and consumption paths.</desc>

  <defs>
    <style><![CDATA[
      .title { font: 700 40px 'Segoe UI', Arial, sans-serif; fill: #102944; }
      .subtitle { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #3a5877; }
      .section-title { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #173a5e; }
      .table-title { font: 700 17px 'Segoe UI', Arial, sans-serif; fill: #163353; }
      .text { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #2f4f6d; }
      .small { font: 500 12px 'Segoe UI', Arial, sans-serif; fill: #486884; }
      .panel-left { fill: #f6fbff; stroke: #a5c6e2; stroke-width: 2; }
      .panel-right { fill: #f9fff8; stroke: #a9cfbe; stroke-width: 2; }
      .panel-bottom { fill: #fffaf4; stroke: #dbc29c; stroke-width: 2; }
      .card { fill: #ffffff; stroke: #bfd1e1; stroke-width: 1.6; }
      .card-green { fill: #ffffff; stroke: #b9d8c7; stroke-width: 1.6; }
      .arrow { stroke: #3f729d; stroke-width: 2.8; fill: none; marker-end: url(#arrowhead); }
      .dashed { stroke-dasharray: 8 6; }
      .mono { font: 500 12px 'Consolas', 'Liberation Mono', monospace; fill: #345573; }
    ]]></style>
    <marker id="arrowhead" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#3f729d"/>
    </marker>
  </defs>

  <text x="44" y="58" class="title">Persistence Topology: Database + Filesystem</text>
  <text x="44" y="90" class="subtitle">How run data is stored, versioned, queried, and pruned in JobFinder</text>

  <rect x="34" y="118" width="940" height="714" rx="14" class="panel-left"/>
  <text x="54" y="150" class="section-title">A. SQLite Schema (`data/jobfinder.sqlite`)</text>

  <rect x="56" y="174" width="280" height="162" rx="10" class="card"/>
  <text x="74" y="202" class="table-title">runs</text>
  <text x="74" y="224" class="text">PK: id (run_id)</text>
  <text x="74" y="244" class="text">profile_id, started_at, completed_at</text>
  <text x="74" y="264" class="text">status, warning_count, error_count</text>
  <text x="74" y="286" class="small">One row per execution</text>

  <rect x="356" y="174" width="280" height="162" rx="10" class="card"/>
  <text x="374" y="202" class="table-title">run_source_status</text>
  <text x="374" y="224" class="text">FK: run_id -> runs.id</text>
  <text x="374" y="244" class="text">source, status</text>
  <text x="374" y="264" class="text">fetched_count, normalized_count</text>
  <text x="374" y="286" class="text">error message (nullable)</text>

  <rect x="656" y="174" width="296" height="162" rx="10" class="card"/>
  <text x="674" y="202" class="table-title">profile_snapshots</text>
  <text x="674" y="224" class="text">FK: run_id -> runs.id</text>
  <text x="674" y="244" class="text">serialized profile used for run</text>
  <text x="674" y="264" class="text">ensures report reproducibility</text>
  <text x="674" y="286" class="small">Immutable config capture</text>

  <rect x="56" y="360" width="280" height="206" rx="10" class="card"/>
  <text x="74" y="388" class="table-title">jobs</text>
  <text x="74" y="410" class="text">PK: id</text>
  <text x="74" y="430" class="text">unique(source, source_job_id)</text>
  <text x="74" y="450" class="text">title, company, location_text</text>
  <text x="74" y="470" class="text">url, is_remote</text>
  <text x="74" y="490" class="text">first_seen_at, last_seen_at</text>
  <text x="74" y="512" class="small">Current canonical row per posting</text>

  <rect x="356" y="360" width="280" height="206" rx="10" class="card"/>
  <text x="374" y="388" class="table-title">job_versions</text>
  <text x="374" y="410" class="text">FK: job_id -> jobs.id</text>
  <text x="374" y="430" class="text">content_hash, posted_at</text>
  <text x="374" y="450" class="text">description_text, employment_type</text>
  <text x="374" y="470" class="text">seniority, raw_snapshot_id</text>
  <text x="374" y="490" class="text">observed_at</text>
  <text x="374" y="512" class="small">History for content change tracking</text>

  <rect x="656" y="360" width="296" height="206" rx="10" class="card"/>
  <text x="674" y="388" class="table-title">alerts</text>
  <text x="674" y="410" class="text">FK: job_id -> jobs.id</text>
  <text x="674" y="430" class="text">FK: run_id -> runs.id</text>
  <text x="674" y="450" class="text">is_new_alert, created_at</text>
  <text x="674" y="472" class="text">dedup window policy (default 90d)</text>
  <text x="674" y="500" class="table-title">job_scores</text>
  <text x="674" y="522" class="text">FK: run_id, FK: job_id</text>
  <text x="674" y="542" class="text">rule, semantic, llm, total, rationale</text>

  <rect x="56" y="588" width="896" height="224" rx="10" class="card"/>
  <text x="74" y="616" class="table-title">Common Query Paths</text>
  <text x="74" y="640" class="text">- Latest run list for sidebar selector</text>
  <text x="74" y="662" class="text">- Ranked jobs by run_id with filters (source/text/score/new_alert)</text>
  <text x="74" y="684" class="text">- Job detail + latest version for description rendering</text>
  <text x="74" y="706" class="text">- Report regeneration from persisted rows (without recrawl)</text>
  <text x="74" y="728" class="text">- Pruning old runs/scores/alerts based on retention days</text>
  <text x="74" y="758" class="mono">Repository API: list_runs(), get_ranked_jobs(), get_job(), get_latest_job_version(), prune()</text>

  <rect x="1008" y="118" width="658" height="714" rx="14" class="panel-right"/>
  <text x="1028" y="150" class="section-title">B. Filesystem Artifacts</text>

  <rect x="1030" y="176" width="614" height="176" rx="10" class="card-green"/>
  <text x="1048" y="204" class="table-title">Raw Snapshots</text>
  <text x="1048" y="228" class="mono">data/raw/YYYY/MM/DD/*.json.gz</text>
  <text x="1048" y="250" class="text">Saved during normalize_records for each successfully fetched raw posting.</text>
  <text x="1048" y="272" class="text">Referenced from `job_versions.raw_snapshot_id` for traceability.</text>
  <text x="1048" y="294" class="text">Used for parser debugging and future re-normalization.</text>

  <rect x="1030" y="370" width="614" height="176" rx="10" class="card-green"/>
  <text x="1048" y="398" class="table-title">Vector Index Artifacts</text>
  <text x="1048" y="422" class="mono">data/index/faiss/&lt;run_id&gt;/</text>
  <text x="1048" y="444" class="text">Generated during embedding_score.</text>
  <text x="1048" y="466" class="text">Captures semantic embedding index used for that run's ranking context.</text>
  <text x="1048" y="488" class="text">Supports diagnostics and consistency checks.</text>

  <rect x="1030" y="564" width="614" height="248" rx="10" class="card-green"/>
  <text x="1048" y="592" class="table-title">Digest Reports</text>
  <text x="1048" y="616" class="mono">data/reports/YYYY-MM-DD/&lt;run_id&gt;.md</text>
  <text x="1048" y="638" class="mono">data/reports/YYYY-MM-DD/&lt;run_id&gt;.json</text>
  <text x="1048" y="662" class="text">Generated in generate_digest node.</text>
  <text x="1048" y="684" class="text">Markdown is human-readable summary; JSON is automation-friendly payload.</text>
  <text x="1048" y="706" class="text">CLI prints both paths for direct access.</text>
  <text x="1048" y="728" class="text">Prune command deletes old reports by retention threshold.</text>
  <text x="1048" y="750" class="small">System-level operational files: `.env`, `config/search_profiles.yaml`, `systemd/*.service|*.timer`</text>

  <rect x="34" y="860" width="1632" height="250" rx="14" class="panel-bottom"/>
  <text x="54" y="892" class="section-title">C. Data Flow and Consumption</text>

  <rect x="56" y="916" width="520" height="170" rx="10" class="card"/>
  <text x="74" y="944" class="table-title">CLI and Reports</text>
  <text x="74" y="968" class="text">`jobfinder run` writes DB + files, then prints summary metrics.</text>
  <text x="74" y="990" class="text">`jobfinder report` rebuilds digest from DB state for a chosen run.</text>
  <text x="74" y="1012" class="text">`jobfinder crawl` keeps same persistence model without expensive scoring.</text>

  <rect x="604" y="916" width="520" height="170" rx="10" class="card"/>
  <text x="622" y="944" class="table-title">Streamlit Dashboard Reads</text>
  <text x="622" y="968" class="text">- list of runs (recent history)</text>
  <text x="622" y="990" class="text">- ranked jobs with score columns and alert flags</text>
  <text x="622" y="1012" class="text">- selected job metadata + latest snapshot description</text>

  <rect x="1152" y="916" width="492" height="170" rx="10" class="card"/>
  <text x="1170" y="944" class="table-title">Retention and Lifecycle</text>
  <text x="1170" y="968" class="text">`jobfinder prune --days N` removes stale rows and files.</text>
  <text x="1170" y="990" class="text">Defaults from `JOBFINDER_RETENTION_DAYS` (180).</text>
  <text x="1170" y="1012" class="text">Canonical jobs remain accurate across repeated runs.</text>


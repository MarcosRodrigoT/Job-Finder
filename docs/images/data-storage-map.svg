<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" role="img" aria-label="JobFinder Data Storage Map">
  <defs>
    <marker id="fk" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#30363d"/>
    </marker>
    <marker id="fk-down" markerWidth="8" markerHeight="6" refX="4" refY="0" orient="auto">
      <polygon points="0 0, 8 0, 4 6" fill="#30363d"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" fill="#0d1117"/>

  <!-- Title area -->
  <text x="30" y="44" fill="#e6edf3" font-size="24" font-weight="bold" font-family="sans-serif">Persistence Topology</text>
  <text x="30" y="66" fill="#8b949e" font-size="13" font-family="sans-serif">SQLite database schema + filesystem artifacts + consumers</text>

  <!-- Left panel — SQLite -->
  <rect x="30" y="82" width="570" height="470" fill="#161b22" stroke="#58a6ff" stroke-width="1.5" rx="10"/>
  <rect x="30" y="82" width="4" height="470" fill="#58a6ff" rx="2"/>
  <text x="52" y="112" fill="#58a6ff" font-size="12" font-weight="bold" font-family="sans-serif">SQLite · data/jobfinder.sqlite</text>

  <!-- Card A — runs (x=50, y=126, width=160, height=110) -->
  <rect x="50" y="126" width="160" height="110" fill="#21262d" stroke="#30363d" stroke-width="1" rx="6"/>
  <text x="130" y="154" fill="#e6edf3" font-size="13" font-weight="bold" font-family="sans-serif" text-anchor="middle">runs</text>
  <text x="60" y="172" fill="#8b949e" font-size="11" font-family="monospace">PK: id (run_id)</text>
  <text x="60" y="188" fill="#8b949e" font-size="11" font-family="monospace">profile_id · started_at</text>
  <text x="60" y="204" fill="#8b949e" font-size="11" font-family="monospace">status · error_count</text>

  <!-- Card B — run_source_status (x=226, y=126, width=180, height=110) -->
  <rect x="226" y="126" width="180" height="110" fill="#21262d" stroke="#30363d" stroke-width="1" rx="6"/>
  <text x="316" y="154" fill="#e6edf3" font-size="13" font-weight="bold" font-family="sans-serif" text-anchor="middle">run_source_status</text>
  <text x="236" y="172" fill="#8b949e" font-size="11" font-family="monospace">FK: run_id</text>
  <text x="236" y="188" fill="#8b949e" font-size="11" font-family="monospace">source · status</text>
  <text x="236" y="204" fill="#8b949e" font-size="11" font-family="monospace">fetched / normalized</text>

  <!-- Card C — profile_snapshots (x=422, y=126, width=160, height=110) -->
  <rect x="422" y="126" width="160" height="110" fill="#21262d" stroke="#30363d" stroke-width="1" rx="6"/>
  <text x="502" y="154" fill="#e6edf3" font-size="13" font-weight="bold" font-family="sans-serif" text-anchor="middle">profile_snapshots</text>
  <text x="432" y="172" fill="#8b949e" font-size="11" font-family="monospace">FK: run_id</text>
  <text x="432" y="188" fill="#8b949e" font-size="11" font-family="monospace">serialized config</text>
  <text x="432" y="204" fill="#8b949e" font-size="10" font-family="monospace">ensures reproducibility</text>

  <!-- Card D — jobs (x=50, y=256, width=160, height=130) -->
  <rect x="50" y="256" width="160" height="130" fill="#21262d" stroke="#30363d" stroke-width="1" rx="6"/>
  <text x="130" y="284" fill="#e6edf3" font-size="13" font-weight="bold" font-family="sans-serif" text-anchor="middle">jobs</text>
  <text x="60" y="302" fill="#8b949e" font-size="11" font-family="monospace">PK: id</text>
  <text x="60" y="318" fill="#8b949e" font-size="11" font-family="monospace">unique(source, job_id)</text>
  <text x="60" y="334" fill="#8b949e" font-size="11" font-family="monospace">title · company</text>
  <text x="60" y="350" fill="#8b949e" font-size="11" font-family="monospace">url · is_remote</text>
  <text x="60" y="366" fill="#8b949e" font-size="11" font-family="monospace">first/last_seen_at</text>

  <!-- Card E — job_versions (x=226, y=256, width=180, height=130) -->
  <rect x="226" y="256" width="180" height="130" fill="#21262d" stroke="#30363d" stroke-width="1" rx="6"/>
  <text x="316" y="284" fill="#e6edf3" font-size="13" font-weight="bold" font-family="sans-serif" text-anchor="middle">job_versions</text>
  <text x="236" y="302" fill="#8b949e" font-size="11" font-family="monospace">FK: job_id</text>
  <text x="236" y="318" fill="#8b949e" font-size="11" font-family="monospace">content_hash · posted_at</text>
  <text x="236" y="334" fill="#8b949e" font-size="11" font-family="monospace">description_text</text>
  <text x="236" y="350" fill="#8b949e" font-size="11" font-family="monospace">seniority · employment</text>

  <!-- Card F — alerts (x=422, y=256, width=160, height=130) -->
  <rect x="422" y="256" width="160" height="130" fill="#21262d" stroke="#30363d" stroke-width="1" rx="6"/>
  <text x="502" y="284" fill="#e6edf3" font-size="13" font-weight="bold" font-family="sans-serif" text-anchor="middle">alerts</text>
  <text x="432" y="302" fill="#8b949e" font-size="11" font-family="monospace">FK: job_id · run_id</text>
  <text x="432" y="318" fill="#8b949e" font-size="11" font-family="monospace">is_new_alert</text>
  <text x="432" y="334" fill="#8b949e" font-size="11" font-family="monospace">dedup window: 90d</text>

  <!-- Card G — job_scores (x=50, y=406, width=532, height=110) -->
  <rect x="50" y="406" width="532" height="110" fill="#21262d" stroke="#30363d" stroke-width="1" rx="6"/>
  <text x="68" y="434" fill="#e6edf3" font-size="13" font-weight="bold" font-family="sans-serif">job_scores</text>
  <text x="68" y="452" fill="#8b949e" font-size="11" font-family="monospace">FK: run_id · job_id</text>
  <text x="68" y="468" fill="#8b949e" font-size="11" font-family="monospace">rule · semantic · llm · total</text>
  <text x="380" y="452" fill="#8b949e" font-size="11" font-family="monospace">rationale (text)</text>
  <text x="380" y="468" fill="#8b949e" font-size="11" font-family="monospace">Ties score to run + job</text>

  <!-- FK Arrows (dashed lines) -->
  <!-- runs -> run_source_status (y~186) -->
  <line x1="210" y1="186" x2="226" y2="186" stroke="#30363d" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#fk)"/>
  <!-- runs -> profile_snapshots (y~181, offset to avoid overlap) -->
  <line x1="210" y1="181" x2="422" y2="181" stroke="#30363d" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#fk)"/>
  <!-- jobs -> job_versions (y~326) -->
  <line x1="210" y1="326" x2="226" y2="326" stroke="#30363d" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#fk)"/>
  <!-- jobs -> alerts (y~320, offset to avoid overlap) -->
  <line x1="210" y1="320" x2="422" y2="320" stroke="#30363d" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#fk)"/>
  <!-- runs -> job_scores (vertical) -->
  <line x1="130" y1="236" x2="130" y2="406" stroke="#30363d" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#fk-down)"/>
  <!-- jobs -> job_scores (vertical) -->
  <line x1="100" y1="386" x2="100" y2="406" stroke="#30363d" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#fk-down)"/>

  <!-- Right panel — Filesystem -->
  <rect x="628" y="82" width="540" height="470" fill="#161b22" stroke="#d29922" stroke-width="1.5" rx="10"/>
  <rect x="628" y="82" width="4" height="470" fill="#d29922" rx="2"/>
  <text x="650" y="112" fill="#d29922" font-size="12" font-weight="bold" font-family="sans-serif">Filesystem Artifacts</text>

  <!-- Card 1 — Raw Snapshots (y=126, height=120) -->
  <rect x="648" y="126" width="500" height="120" fill="#21262d" stroke="#30363d" stroke-width="1" rx="6"/>
  <rect x="648" y="126" width="3" height="120" fill="#58a6ff" rx="1"/>
  <text x="666" y="154" fill="#58a6ff" font-size="13" font-weight="bold" font-family="sans-serif">Raw Snapshots</text>
  <text x="666" y="174" fill="#8b949e" font-size="12" font-family="monospace">data/raw/YYYY/MM/DD/*.json.gz</text>
  <text x="666" y="194" fill="#8b949e" font-size="12" font-family="sans-serif">Saved during normalize_records</text>
  <text x="666" y="212" fill="#8b949e" font-size="11" font-family="sans-serif">Referenced from job_versions.raw_snapshot_id</text>

  <!-- Card 2 — Vector Index (y=260, height=120) -->
  <rect x="648" y="260" width="500" height="120" fill="#21262d" stroke="#30363d" stroke-width="1" rx="6"/>
  <rect x="648" y="260" width="3" height="120" fill="#bc8cff" rx="1"/>
  <text x="666" y="288" fill="#bc8cff" font-size="13" font-weight="bold" font-family="sans-serif">Vector Index</text>
  <text x="666" y="308" fill="#8b949e" font-size="12" font-family="monospace">data/index/faiss/&lt;run_id&gt;/</text>
  <text x="666" y="328" fill="#8b949e" font-size="12" font-family="sans-serif">Generated during embedding_score</text>
  <text x="666" y="346" fill="#8b949e" font-size="11" font-family="sans-serif">Per-run FAISS artifacts for diagnostics</text>

  <!-- Card 3 — Digest Reports (y=394, height=140) -->
  <rect x="648" y="394" width="500" height="140" fill="#21262d" stroke="#30363d" stroke-width="1" rx="6"/>
  <rect x="648" y="394" width="3" height="140" fill="#d29922" rx="1"/>
  <text x="666" y="422" fill="#d29922" font-size="13" font-weight="bold" font-family="sans-serif">Digest Reports</text>
  <text x="666" y="442" fill="#8b949e" font-size="12" font-family="monospace">data/reports/YYYY-MM-DD/&lt;run_id&gt;.md</text>
  <text x="666" y="462" fill="#8b949e" font-size="12" font-family="monospace">data/reports/YYYY-MM-DD/&lt;run_id&gt;.json</text>
  <text x="666" y="482" fill="#8b949e" font-size="11" font-family="sans-serif">Written by generate_digest · human + machine readable</text>
  <text x="666" y="500" fill="#8b949e" font-size="11" font-family="sans-serif">Prunable by `jobfinder prune --days N`</text>

  <!-- Bottom strip — Consumers -->
  <rect x="30" y="572" width="1140" height="110" fill="#161b22" stroke="#30363d" stroke-width="1.5" rx="8"/>
  <text x="50" y="598" fill="#8b949e" font-size="11" font-weight="bold" font-family="sans-serif" letter-spacing="2">Consumers</text>

  <!-- Consumer Card 1 — CLI (x=48, width=340, stroke=#3fb950) -->
  <rect x="48" y="610" width="340" height="60" fill="#21262d" stroke="#3fb950" stroke-width="1" rx="6"/>
  <text x="66" y="632" fill="#3fb950" font-size="12" font-weight="bold" font-family="sans-serif">CLI · run / crawl / report</text>
  <text x="66" y="650" fill="#8b949e" font-size="11" font-family="sans-serif">writes DB rows + file artifacts</text>

  <!-- Consumer Card 2 — Streamlit (x=420, width=340, stroke=#58a6ff) -->
  <rect x="420" y="610" width="340" height="60" fill="#21262d" stroke="#58a6ff" stroke-width="1" rx="6"/>
  <text x="438" y="632" fill="#58a6ff" font-size="12" font-weight="bold" font-family="sans-serif">Streamlit Dashboard</text>
  <text x="438" y="650" fill="#8b949e" font-size="11" font-family="sans-serif">reads runs · scores · job descriptions</text>

  <!-- Consumer Card 3 — prune (x=792, width=340, stroke=#f85149) -->
  <rect x="792" y="610" width="340" height="60" fill="#21262d" stroke="#f85149" stroke-width="1" rx="6"/>
  <text x="810" y="632" fill="#f85149" font-size="12" font-weight="bold" font-family="sans-serif">jobfinder prune</text>
  <text x="810" y="650" fill="#8b949e" font-size="11" font-family="sans-serif">deletes old rows + files by retention days</text>

  <!-- Dashed downward arrows to consumer strip -->
  <line x1="315" y1="552" x2="315" y2="572" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#fk-down)"/>
  <line x1="900" y1="552" x2="900" y2="572" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#fk-down)"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="820" height="1300" role="img" aria-label="JobFinder LangGraph Pipeline Diagram">
  <defs>
    <marker id="down" markerWidth="8" markerHeight="6" refX="4" refY="0" orient="auto">
      <polygon points="0 0, 8 0, 4 6" fill="#30363d"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="1300" fill="#0d1117"/>

  <!-- Title area -->
  <text x="30" y="44" font-family="monospace, sans-serif" font-size="24" font-weight="bold" fill="#e6edf3">LangGraph Pipeline</text>
  <text x="30" y="66" font-family="monospace, sans-serif" font-size="13" fill="#8b949e">src/jobfinder/graph/workflow.py &#x2014; 12-node deterministic graph</text>

  <!-- Phase bracket: Phase A (blue) covers nodes 1-5: y=90 to y=500, height=410 -->
  <rect x="30" y="90" width="8" height="410" rx="4" fill="#1f3a5f" stroke="#58a6ff" stroke-width="1.5"/>
  <!-- Phase A label: center y = 90 + 410/2 = 295 -->
  <text transform="rotate(-90, 34, 295)" x="34" y="295" text-anchor="middle" font-family="monospace, sans-serif" font-size="11" font-weight="bold" fill="#58a6ff">Phase A</text>

  <!-- Phase bracket: Phase B (green) covers nodes 6-9: y=510 to y=836, height=326 -->
  <rect x="30" y="510" width="8" height="326" rx="4" fill="#1a3a22" stroke="#3fb950" stroke-width="1.5"/>
  <!-- Phase B label: center y = 510 + 326/2 = 673 -->
  <text transform="rotate(-90, 34, 673)" x="34" y="673" text-anchor="middle" font-family="monospace, sans-serif" font-size="11" font-weight="bold" fill="#3fb950">Phase B</text>

  <!-- Phase bracket: Phase C (orange) covers nodes 10-12: y=846 to y=1088, height=242 -->
  <rect x="30" y="846" width="8" height="242" rx="4" fill="#3a2a10" stroke="#d29922" stroke-width="1.5"/>
  <!-- Phase C label: center y = 846 + 242/2 = 967 -->
  <text transform="rotate(-90, 34, 967)" x="34" y="967" text-anchor="middle" font-family="monospace, sans-serif" font-size="11" font-weight="bold" fill="#d29922">Phase C</text>

  <!-- ============================================================ -->
  <!-- NODE 1: load_profile (y=90, Phase A / blue) -->
  <!-- ============================================================ -->
  <rect x="110" y="90" width="680" height="74" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <rect x="110" y="90" width="4" height="74" rx="2" fill="#58a6ff"/>
  <circle cx="135" cy="127" r="14" fill="#58a6ff"/>
  <text x="135" y="132" text-anchor="middle" font-family="monospace, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">1</text>
  <text x="160" y="120" font-family="monospace, sans-serif" font-size="14" font-weight="bold" fill="#e6edf3">load_profile</text>
  <text x="160" y="140" font-family="monospace, sans-serif" font-size="12" fill="#8b949e">persist run start &#xB7; snapshot profile config</text>

  <!-- Arrow: node 1 bottom (164) to node 2 top (174) -->
  <line x1="450" y1="164" x2="450" y2="174" stroke="#30363d" stroke-width="1.5" marker-end="url(#down)"/>

  <!-- ============================================================ -->
  <!-- NODE 2: expand_queries (y=174, Phase A) -->
  <!-- ============================================================ -->
  <rect x="110" y="174" width="680" height="74" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <rect x="110" y="174" width="4" height="74" rx="2" fill="#58a6ff"/>
  <circle cx="135" cy="211" r="14" fill="#58a6ff"/>
  <text x="135" y="216" text-anchor="middle" font-family="monospace, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">2</text>
  <text x="160" y="204" font-family="monospace, sans-serif" font-size="14" font-weight="bold" fill="#e6edf3">expand_queries</text>
  <text x="160" y="224" font-family="monospace, sans-serif" font-size="12" fill="#8b949e">merge roles + synonyms &#xB7; append locations</text>

  <!-- Arrow: node 2 bottom (248) to node 3 top (258) -->
  <line x1="450" y1="248" x2="450" y2="258" stroke="#30363d" stroke-width="1.5" marker-end="url(#down)"/>

  <!-- ============================================================ -->
  <!-- NODE 3: fetch_sources_parallel (y=258, Phase A) -->
  <!-- ============================================================ -->
  <rect x="110" y="258" width="680" height="74" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <rect x="110" y="258" width="4" height="74" rx="2" fill="#58a6ff"/>
  <circle cx="135" cy="295" r="14" fill="#58a6ff"/>
  <text x="135" y="300" text-anchor="middle" font-family="monospace, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">3</text>
  <text x="160" y="288" font-family="monospace, sans-serif" font-size="14" font-weight="bold" fill="#e6edf3">fetch_sources_parallel</text>
  <text x="160" y="308" font-family="monospace, sans-serif" font-size="12" fill="#8b949e">16 source adapters &#xB7; concurrent HTTPX</text>
  <text x="160" y="324" font-family="monospace, sans-serif" font-size="12" fill="#8b949e">per-source status: success / blocked / error</text>

  <!-- Arrow: node 3 bottom (332) to node 4 top (342) -->
  <line x1="450" y1="332" x2="450" y2="342" stroke="#30363d" stroke-width="1.5" marker-end="url(#down)"/>

  <!-- ============================================================ -->
  <!-- NODE 4: normalize_records (y=342, Phase A) -->
  <!-- ============================================================ -->
  <rect x="110" y="342" width="680" height="74" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <rect x="110" y="342" width="4" height="74" rx="2" fill="#58a6ff"/>
  <circle cx="135" cy="379" r="14" fill="#58a6ff"/>
  <text x="135" y="384" text-anchor="middle" font-family="monospace, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">4</text>
  <text x="160" y="372" font-family="monospace, sans-serif" font-size="14" font-weight="bold" fill="#e6edf3">normalize_records</text>
  <text x="160" y="392" font-family="monospace, sans-serif" font-size="12" fill="#8b949e">canonical schema &#xB7; save raw .json.gz</text>

  <!-- Arrow: node 4 bottom (416) to node 5 top (426) -->
  <line x1="450" y1="416" x2="450" y2="426" stroke="#30363d" stroke-width="1.5" marker-end="url(#down)"/>

  <!-- ============================================================ -->
  <!-- NODE 5: deduplicate_and_upsert (y=426, Phase A) -->
  <!-- ============================================================ -->
  <rect x="110" y="426" width="680" height="74" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <rect x="110" y="426" width="4" height="74" rx="2" fill="#58a6ff"/>
  <circle cx="135" cy="463" r="14" fill="#58a6ff"/>
  <text x="135" y="468" text-anchor="middle" font-family="monospace, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">5</text>
  <text x="160" y="456" font-family="monospace, sans-serif" font-size="14" font-weight="bold" fill="#e6edf3">deduplicate_and_upsert</text>
  <text x="160" y="476" font-family="monospace, sans-serif" font-size="12" fill="#8b949e">upsert jobs + versions &#xB7; 90-day dedup window</text>

  <!-- Arrow: node 5 bottom (500) to node 6 top (510) -->
  <line x1="450" y1="500" x2="450" y2="510" stroke="#30363d" stroke-width="1.5" marker-end="url(#down)"/>

  <!-- ============================================================ -->
  <!-- NODE 6: rule_filter (y=510, Phase B / green) -->
  <!-- ============================================================ -->
  <rect x="110" y="510" width="680" height="74" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <rect x="110" y="510" width="4" height="74" rx="2" fill="#3fb950"/>
  <circle cx="135" cy="547" r="14" fill="#3fb950"/>
  <text x="135" y="552" text-anchor="middle" font-family="monospace, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">6</text>
  <text x="160" y="540" font-family="monospace, sans-serif" font-size="14" font-weight="bold" fill="#e6edf3">rule_filter</text>
  <text x="160" y="560" font-family="monospace, sans-serif" font-size="12" fill="#8b949e">title / location / skill heuristics &#xB7; threshold filter</text>
  <text x="160" y="576" font-family="monospace, sans-serif" font-size="12" fill="#8b949e">score weight: 35%</text>

  <!-- Arrow: node 6 bottom (584) to node 7 top (594) -->
  <line x1="450" y1="584" x2="450" y2="594" stroke="#30363d" stroke-width="1.5" marker-end="url(#down)"/>

  <!-- ============================================================ -->
  <!-- NODE 7: embedding_score (y=594, Phase B) -->
  <!-- ============================================================ -->
  <rect x="110" y="594" width="680" height="74" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <rect x="110" y="594" width="4" height="74" rx="2" fill="#3fb950"/>
  <circle cx="135" cy="631" r="14" fill="#3fb950"/>
  <text x="135" y="636" text-anchor="middle" font-family="monospace, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">7</text>
  <text x="160" y="624" font-family="monospace, sans-serif" font-size="14" font-weight="bold" fill="#e6edf3">embedding_score</text>
  <text x="160" y="644" font-family="monospace, sans-serif" font-size="12" fill="#8b949e">Ollama embed model + FAISS cosine similarity</text>
  <text x="160" y="660" font-family="monospace, sans-serif" font-size="12" fill="#8b949e">score weight: 30%</text>

  <!-- Arrow: node 7 bottom (668) to node 8 top (678) -->
  <line x1="450" y1="668" x2="450" y2="678" stroke="#30363d" stroke-width="1.5" marker-end="url(#down)"/>

  <!-- ============================================================ -->
  <!-- NODE 8: llm_fit_score (y=678, Phase B) -->
  <!-- ============================================================ -->
  <rect x="110" y="678" width="680" height="74" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <rect x="110" y="678" width="4" height="74" rx="2" fill="#3fb950"/>
  <circle cx="135" cy="715" r="14" fill="#3fb950"/>
  <text x="135" y="720" text-anchor="middle" font-family="monospace, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">8</text>
  <text x="160" y="708" font-family="monospace, sans-serif" font-size="14" font-weight="bold" fill="#e6edf3">llm_fit_score</text>
  <text x="160" y="728" font-family="monospace, sans-serif" font-size="12" fill="#8b949e">Ollama chat &#xB7; role / research / location / seniority</text>
  <text x="160" y="744" font-family="monospace, sans-serif" font-size="12" fill="#8b949e">score weight: 35%</text>

  <!-- Arrow: node 8 bottom (752) to node 9 top (762) -->
  <line x1="450" y1="752" x2="450" y2="762" stroke="#30363d" stroke-width="1.5" marker-end="url(#down)"/>

  <!-- ============================================================ -->
  <!-- NODE 9: rank_and_select (y=762, Phase B) -->
  <!-- ============================================================ -->
  <rect x="110" y="762" width="680" height="74" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <rect x="110" y="762" width="4" height="74" rx="2" fill="#3fb950"/>
  <circle cx="135" cy="799" r="14" fill="#3fb950"/>
  <text x="135" y="804" text-anchor="middle" font-family="monospace, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">9</text>
  <text x="160" y="792" font-family="monospace, sans-serif" font-size="14" font-weight="bold" fill="#e6edf3">rank_and_select</text>
  <text x="160" y="812" font-family="monospace, sans-serif" font-size="12" fill="#8b949e">weighted composite + freshness bonus &#xB7; top N digest</text>

  <!-- Arrow: node 9 bottom (836) to node 10 top (846) -->
  <line x1="450" y1="836" x2="450" y2="846" stroke="#30363d" stroke-width="1.5" marker-end="url(#down)"/>

  <!-- ============================================================ -->
  <!-- NODE 10: persist_outputs (y=846, Phase C / orange) -->
  <!-- ============================================================ -->
  <rect x="110" y="846" width="680" height="74" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <rect x="110" y="846" width="4" height="74" rx="2" fill="#d29922"/>
  <circle cx="135" cy="883" r="14" fill="#d29922"/>
  <text x="135" y="888" text-anchor="middle" font-family="monospace, sans-serif" font-size="11" font-weight="bold" fill="#ffffff">10</text>
  <text x="160" y="876" font-family="monospace, sans-serif" font-size="14" font-weight="bold" fill="#e6edf3">persist_outputs</text>
  <text x="160" y="896" font-family="monospace, sans-serif" font-size="12" fill="#8b949e">save run_source_status + job_scores rows</text>

  <!-- Arrow: node 10 bottom (920) to node 11 top (930) -->
  <line x1="450" y1="920" x2="450" y2="930" stroke="#30363d" stroke-width="1.5" marker-end="url(#down)"/>

  <!-- ============================================================ -->
  <!-- NODE 11: generate_digest (y=930, Phase C) -->
  <!-- ============================================================ -->
  <rect x="110" y="930" width="680" height="74" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <rect x="110" y="930" width="4" height="74" rx="2" fill="#d29922"/>
  <circle cx="135" cy="967" r="14" fill="#d29922"/>
  <text x="135" y="972" text-anchor="middle" font-family="monospace, sans-serif" font-size="11" font-weight="bold" fill="#ffffff">11</text>
  <text x="160" y="960" font-family="monospace, sans-serif" font-size="14" font-weight="bold" fill="#e6edf3">generate_digest</text>
  <text x="160" y="980" font-family="monospace, sans-serif" font-size="12" fill="#8b949e">write .md + .json report files &#xB7; top_n = digest_size</text>

  <!-- Arrow: node 11 bottom (1004) to node 12 top (1014) -->
  <line x1="450" y1="1004" x2="450" y2="1014" stroke="#30363d" stroke-width="1.5" marker-end="url(#down)"/>

  <!-- ============================================================ -->
  <!-- NODE 12: finalize_run_status (y=1014, Phase C) -->
  <!-- ============================================================ -->
  <rect x="110" y="1014" width="680" height="74" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <rect x="110" y="1014" width="4" height="74" rx="2" fill="#d29922"/>
  <circle cx="135" cy="1051" r="14" fill="#d29922"/>
  <text x="135" y="1056" text-anchor="middle" font-family="monospace, sans-serif" font-size="11" font-weight="bold" fill="#ffffff">12</text>
  <text x="160" y="1044" font-family="monospace, sans-serif" font-size="14" font-weight="bold" fill="#e6edf3">finalize_run_status</text>
  <text x="160" y="1064" font-family="monospace, sans-serif" font-size="12" fill="#8b949e">completed / warnings / errors / failed</text>
  <text x="160" y="1080" font-family="monospace, sans-serif" font-size="12" fill="#8b949e">fails only if all sources failed or were skipped</text>

  <!-- ============================================================ -->
  <!-- Footer annotation boxes -->
  <!-- ============================================================ -->

  <!-- Box 1: crawl_only mode -->
  <rect x="110" y="1110" width="315" height="60" rx="6" fill="#21262d" stroke="#bc8cff"/>
  <text x="128" y="1132" font-family="monospace, sans-serif" font-size="12" font-weight="bold" fill="#bc8cff">crawl_only mode</text>
  <text x="128" y="1152" font-family="monospace, sans-serif" font-size="11" fill="#8b949e">skips embedding_score + llm_fit_score</text>

  <!-- Box 2: Failure policy -->
  <rect x="455" y="1110" width="335" height="60" rx="6" fill="#21262d" stroke="#f85149"/>
  <text x="473" y="1132" font-family="monospace, sans-serif" font-size="12" font-weight="bold" fill="#f85149">Failure policy</text>
  <text x="473" y="1152" font-family="monospace, sans-serif" font-size="11" fill="#8b949e">run fails only if all sources failed/skipped</text>

</svg>

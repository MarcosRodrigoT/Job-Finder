<svg xmlns="http://www.w3.org/2000/svg" width="1780" height="1320" viewBox="0 0 1780 1320" role="img" aria-labelledby="title desc">
  <title id="title">LangGraph Pipeline Detailed Flow</title>
  <desc id="desc">Detailed node-by-node execution flow for JobFinder workflow including state transitions, persistence points, and failure semantics.</desc>

  <defs>
    <style><![CDATA[
      .title { font: 700 40px 'Segoe UI', Arial, sans-serif; fill: #0f2b46; }
      .subtitle { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #3b5876; }
      .lane { fill: #f7fbff; stroke: #a8c6e1; stroke-width: 2; }
      .lane2 { fill: #f7fffb; stroke: #a7d0be; stroke-width: 2; }
      .lane3 { fill: #fffaf4; stroke: #dbc09b; stroke-width: 2; }
      .lane4 { fill: #f9f7ff; stroke: #c0b3df; stroke-width: 2; }
      .node { fill: #ffffff; stroke: #b5c9dc; stroke-width: 1.8; }
      .node-io { fill: #f5f9ff; stroke: #c8d8e8; stroke-width: 1.4; }
      .node-title { font: 700 17px 'Segoe UI', Arial, sans-serif; fill: #183453; }
      .node-text { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #345470; }
      .lane-title { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #173a5d; }
      .small { font: 500 12px 'Segoe UI', Arial, sans-serif; fill: #496783; }
      .arrow { stroke: #3f739f; stroke-width: 2.8; fill: none; marker-end: url(#arrowhead); }
      .dashed { stroke-dasharray: 8 6; }
      .warn { fill: #fff4e9; stroke: #d9a96f; stroke-width: 1.6; }
    ]]></style>
    <marker id="arrowhead" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#3f739f"/>
    </marker>
  </defs>

  <text x="46" y="60" class="title">LangGraph Workflow: Node-Level Execution</text>
  <text x="46" y="92" class="subtitle">`src/jobfinder/graph/workflow.py` - deterministic 12-node graph with explicit state transitions</text>

  <rect x="36" y="116" width="1708" height="204" rx="14" class="lane"/>
  <text x="56" y="148" class="lane-title">Phase A: Run Setup and Source Fetching</text>

  <rect x="58" y="170" width="256" height="128" rx="12" class="node"/>
  <text x="76" y="198" class="node-title">1. load_profile</text>
  <text x="76" y="220" class="node-text">- persist run start</text>
  <text x="76" y="240" class="node-text">- snapshot profile config</text>
  <text x="76" y="260" class="node-text">- initialize state containers</text>

  <rect x="346" y="170" width="256" height="128" rx="12" class="node"/>
  <text x="364" y="198" class="node-title">2. expand_queries</text>
  <text x="364" y="220" class="node-text">- merge target roles + synonyms</text>
  <text x="364" y="240" class="node-text">- append location terms</text>
  <text x="364" y="260" class="node-text">- de-duplicate query list</text>

  <rect x="634" y="170" width="324" height="128" rx="12" class="node"/>
  <text x="652" y="198" class="node-title">3. fetch_sources_parallel</text>
  <text x="652" y="220" class="node-text">- concurrent adapter fetch with HTTPX</text>
  <text x="652" y="240" class="node-text">- source status: success/error/blocked/skipped</text>
  <text x="652" y="260" class="node-text">- capture warnings per source</text>

  <rect x="990" y="170" width="324" height="128" rx="12" class="node"/>
  <text x="1008" y="198" class="node-title">4. normalize_records</text>
  <text x="1008" y="220" class="node-text">- save raw payload snapshots (.json.gz)</text>
  <text x="1008" y="240" class="node-text">- map source payload -> normalized model</text>
  <text x="1008" y="260" class="node-text">- update per-source normalized counters</text>

  <rect x="1346" y="170" width="374" height="128" rx="12" class="node"/>
  <text x="1364" y="198" class="node-title">5. deduplicate_and_upsert</text>
  <text x="1364" y="220" class="node-text">- upsert canonical jobs + versions</text>
  <text x="1364" y="240" class="node-text">- evaluate dedup window (default 90 days)</text>
  <text x="1364" y="260" class="node-text">- mark new alerts only when unseen</text>

  <rect x="36" y="344" width="1708" height="214" rx="14" class="lane2"/>
  <text x="56" y="376" class="lane-title">Phase B: Candidate Filtering and Scoring</text>

  <rect x="58" y="400" width="274" height="138" rx="12" class="node"/>
  <text x="76" y="428" class="node-title">6. rule_filter</text>
  <text x="76" y="450" class="node-text">- deterministic title/location/skill scoring</text>
  <text x="76" y="470" class="node-text">- keeps candidates (threshold 10)</text>
  <text x="76" y="490" class="node-text">- fallback to all normalized jobs if empty</text>

  <rect x="364" y="400" width="314" height="138" rx="12" class="node"/>
  <text x="382" y="428" class="node-title">7. embedding_score</text>
  <text x="382" y="450" class="node-text">- crawl_only: semantic score = 0</text>
  <text x="382" y="470" class="node-text">- else Ollama embed model + FAISS</text>
  <text x="382" y="490" class="node-text">- persist per-run FAISS index artifacts</text>

  <rect x="710" y="400" width="314" height="138" rx="12" class="node"/>
  <text x="728" y="428" class="node-title">8. llm_fit_score</text>
  <text x="728" y="450" class="node-text">- crawl_only: synthetic fit rationale</text>
  <text x="728" y="470" class="node-text">- else Ollama chat fit evaluation</text>
  <text x="728" y="490" class="node-text">- role/research/location/seniority fields</text>

  <rect x="1056" y="400" width="314" height="138" rx="12" class="node"/>
  <text x="1074" y="428" class="node-title">9. rank_and_select</text>
  <text x="1074" y="450" class="node-text">- combine weighted rule/semantic/llm</text>
  <text x="1074" y="470" class="node-text">- apply freshness bonus by posted_at</text>
  <text x="1074" y="490" class="node-text">- sort + compute top digest set</text>

  <rect x="1402" y="400" width="318" height="138" rx="12" class="node"/>
  <text x="1420" y="428" class="node-title">Intermediate State Outputs</text>
  <text x="1420" y="450" class="node-text">rule_scores, semantic_scores, llm_fits,</text>
  <text x="1420" y="470" class="node-text">ranked_jobs, top_jobs, alert flags,</text>
  <text x="1420" y="490" class="node-text">profile + source status context</text>

  <rect x="36" y="582" width="1708" height="236" rx="14" class="lane3"/>
  <text x="56" y="614" class="lane-title">Phase C: Persistence and Reporting</text>

  <rect x="58" y="638" width="324" height="154" rx="12" class="node"/>
  <text x="76" y="666" class="node-title">10. persist_outputs</text>
  <text x="76" y="688" class="node-text">- save run_source_status rows</text>
  <text x="76" y="708" class="node-text">- save job_scores rows for ranked jobs</text>
  <text x="76" y="728" class="node-text">- tie each score row to job + run</text>
  <text x="76" y="748" class="node-text">- store new-alert metadata</text>

  <rect x="414" y="638" width="324" height="154" rx="12" class="node"/>
  <text x="432" y="666" class="node-title">11. generate_digest</text>
  <text x="432" y="688" class="node-text">- build markdown digest</text>
  <text x="432" y="708" class="node-text">- build JSON digest</text>
  <text x="432" y="728" class="node-text">- write file paths into RunResult</text>
  <text x="432" y="748" class="node-text">- top_n = profile.digest_size</text>

  <rect x="770" y="638" width="384" height="154" rx="12" class="node"/>
  <text x="788" y="666" class="node-title">12. finalize_run_status</text>
  <text x="788" y="688" class="node-text">- set completed timestamp</text>
  <text x="788" y="708" class="node-text">- compute status: completed / warnings / errors / failed</text>
  <text x="788" y="728" class="node-text">- fail only when no source succeeded</text>
  <text x="788" y="748" class="node-text">- persist run completion summary</text>

  <rect x="1186" y="638" width="534" height="154" rx="12" class="node-io"/>
  <text x="1204" y="666" class="node-title">Artifacts Produced</text>
  <text x="1204" y="688" class="node-text">- DB: runs, source statuses, jobs, versions, alerts, scores</text>
  <text x="1204" y="708" class="node-text">- Files: raw snapshots, FAISS indices, md/json reports</text>
  <text x="1204" y="728" class="node-text">- Streamlit UI reads latest persisted run data</text>
  <text x="1204" y="748" class="node-text">- CLI prints run_id + report paths</text>

  <rect x="36" y="844" width="1708" height="430" rx="14" class="lane4"/>
  <text x="56" y="876" class="lane-title">Operational Semantics and Control Flags</text>

  <rect x="58" y="898" width="540" height="168" rx="12" class="warn"/>
  <text x="76" y="928" class="node-title">Failure Policy</text>
  <text x="76" y="952" class="node-text">- Source-level errors are isolated and logged as warnings.</text>
  <text x="76" y="974" class="node-text">- LinkedIn block/CAPTCHA -> status=blocked (non-fatal).</text>
  <text x="76" y="996" class="node-text">- Run fails only if every enabled source produced no success.</text>
  <text x="76" y="1018" class="node-text">- Missing embed model triggers semantic fallback warning.</text>
  <text x="76" y="1040" class="node-text">- LLM parse issues are captured without crashing whole run.</text>

  <rect x="628" y="898" width="540" height="168" rx="12" class="node-io"/>
  <text x="646" y="928" class="node-title">crawl_only Mode</text>
  <text x="646" y="952" class="node-text">- Invoked by `jobfinder crawl`.</text>
  <text x="646" y="974" class="node-text">- Skips expensive semantic and chat-model scoring.</text>
  <text x="646" y="996" class="node-text">- Uses zero semantic score + synthetic LLM rationale.</text>
  <text x="646" y="1018" class="node-text">- Still normalizes, deduplicates, persists, and reports.</text>

  <rect x="1198" y="898" width="522" height="168" rx="12" class="node-io"/>
  <text x="1216" y="928" class="node-title">State Contract Highlights</text>
  <text x="1216" y="952" class="node-text">- JobFinderState carries profile, run_result, and intermediate maps.</text>
  <text x="1216" y="974" class="node-text">- fingerprint key = `source:source_job_id` across scoring maps.</text>
  <text x="1216" y="996" class="node-text">- RunResult aggregates counts, warnings/errors, top jobs, report paths.</text>
  <text x="1216" y="1018" class="node-text">- Used by CLI output and reporting module.</text>

  <rect x="58" y="1088" width="1662" height="162" rx="12" class="node"/>
  <text x="76" y="1118" class="node-title">Node Sequence</text>
  <text x="76" y="1142" class="small">START -> load_profile -> expand_queries -> fetch_sources_parallel -> normalize_records -> deduplicate_and_upsert -> rule_filter -> embedding_score -> llm_fit_score -> rank_and_select -> persist_outputs -> generate_digest -> finalize_run_status -> END</text>
  <text x="76" y="1170" class="small">The graph order is static and intentionally explicit for observability and easier debugging.</text>


<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">JobFinder Architecture Overview</title>
  <desc id="desc">System architecture showing CLI, web UI, workflow engine, adapters, scoring, and storage.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef5ff"/>
      <stop offset="100%" stop-color="#dce8ff"/>
    </linearGradient>
    <style><![CDATA[
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #14345a; }
      .subtitle { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #35557d; }
      .box-title { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #0e2a47; }
      .box-text { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #173c62; }
      .lane-title { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #0f2f4f; }
      .arrow { stroke: #2f5f96; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .dashed { stroke-dasharray: 8 6; }
    ]]></style>
    <marker id="arrowhead" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#2f5f96"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1440" height="900" fill="url(#bg)"/>

  <text x="60" y="70" class="title">JobFinder Local AI Agent</text>
  <text x="60" y="102" class="subtitle">Ollama + LangChain/LangGraph + SQLite/FAISS + FastAPI dashboard</text>

  <rect x="50" y="145" width="1340" height="210" rx="22" fill="#cfe0ff" opacity="0.38"/>
  <text x="70" y="178" class="lane-title">Entry Points</text>

  <rect x="90" y="200" width="340" height="130" rx="16" fill="#ffffff" stroke="#7ea4d9" stroke-width="2"/>
  <text x="112" y="236" class="box-title">CLI (Typer)</text>
  <text x="112" y="264" class="box-text">`run`, `crawl`, `report`, `serve`, `prune`</text>
  <text x="112" y="288" class="box-text">Loads profile + env, executes service</text>

  <rect x="500" y="200" width="380" height="130" rx="16" fill="#ffffff" stroke="#7ea4d9" stroke-width="2"/>
  <text x="522" y="236" class="box-title">Web UI (FastAPI + Jinja2)</text>
  <text x="522" y="264" class="box-text">Read-only dashboard over persisted runs</text>
  <text x="522" y="288" class="box-text">Source health, ranked jobs, run detail</text>

  <rect x="950" y="200" width="390" height="130" rx="16" fill="#ffffff" stroke="#7ea4d9" stroke-width="2"/>
  <text x="972" y="236" class="box-title">Config Layer</text>
  <text x="972" y="264" class="box-text">`config/search_profiles.yaml`</text>
  <text x="972" y="288" class="box-text">`.env` with `JOBFINDER_*` settings</text>

  <rect x="50" y="385" width="1340" height="245" rx="22" fill="#b9f0dd" opacity="0.30"/>
  <text x="70" y="418" class="lane-title">Core Pipeline (LangGraph)</text>

  <rect x="90" y="442" width="1240" height="165" rx="16" fill="#ffffff" stroke="#6dc29f" stroke-width="2"/>
  <text x="112" y="478" class="box-title">Workflow Engine</text>
  <text x="112" y="505" class="box-text">load_profile → fetch_sources_parallel → normalize → dedup/upsert → score → rank → report</text>
  <text x="112" y="531" class="box-text">Partial failure tolerant: per-source errors logged, run continues</text>
  <text x="112" y="557" class="box-text">LinkedIn blocked → marked as `blocked`, not fatal</text>

  <rect x="50" y="660" width="1340" height="200" rx="22" fill="#ffd9be" opacity="0.32"/>
  <text x="70" y="692" class="lane-title">Adapters, Scoring, and Storage</text>

  <rect x="90" y="716" width="360" height="120" rx="14" fill="#ffffff" stroke="#d59d6d" stroke-width="2"/>
  <text x="112" y="748" class="box-title">Source Adapters</text>
  <text x="112" y="773" class="box-text">LinkedIn, Greenhouse, Workable, Lever,</text>
  <text x="112" y="796" class="box-text">OpenAI Careers, Anthropic Careers</text>

  <rect x="520" y="716" width="360" height="120" rx="14" fill="#ffffff" stroke="#d59d6d" stroke-width="2"/>
  <text x="542" y="748" class="box-title">Scoring Stack</text>
  <text x="542" y="773" class="box-text">Rule score + FAISS semantic score +</text>
  <text x="542" y="796" class="box-text">Ollama LLM fit (`ministral-3:14b`)</text>

  <rect x="950" y="716" width="380" height="120" rx="14" fill="#ffffff" stroke="#d59d6d" stroke-width="2"/>
  <text x="972" y="748" class="box-title">Persistence</text>
  <text x="972" y="773" class="box-text">SQLite (`runs`, `jobs`, `job_scores`, alerts)</text>
  <text x="972" y="796" class="box-text">Raw snapshots + reports + FAISS indices</text>

  <path class="arrow" d="M260 331 L260 440"/>
  <path class="arrow" d="M690 331 L690 440"/>
  <path class="arrow" d="M1145 331 L1145 440"/>

  <path class="arrow" d="M260 607 L260 715"/>
  <path class="arrow" d="M690 607 L690 715"/>
  <path class="arrow" d="M1145 607 L1145 715"/>

  <path class="arrow dashed" d="M450 775 L520 775"/>
  <path class="arrow dashed" d="M880 775 L950 775"/>
</svg>

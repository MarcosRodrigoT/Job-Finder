<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" role="img" aria-label="JobFinder Architecture Diagram">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#58a6ff"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#d29922"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#bc8cff"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="640" fill="#0d1117"/>

  <!-- Title area -->
  <text x="40" y="50" fill="#e6edf3" font-family="'Segoe UI', system-ui, sans-serif" font-size="26" font-weight="bold">JobFinder Architecture</text>
  <text x="40" y="72" fill="#8b949e" font-family="'Segoe UI', system-ui, sans-serif" font-size="14">Ollama · LangGraph · SQLite · Streamlit</text>

  <!-- ===================== COLUMN 1 — INPUTS ===================== -->
  <!-- Column panel -->
  <rect x="30" y="96" width="330" height="400" fill="#161b22" stroke="#30363d" stroke-width="1.5" rx="10"/>
  <!-- Left accent bar -->
  <rect x="30" y="96" width="4" height="400" fill="#58a6ff" rx="2"/>
  <!-- Column header -->
  <text x="55" y="126" fill="#58a6ff" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="bold" letter-spacing="2">INPUTS</text>

  <!-- Card 1 — CLI Commands (y=140, height=110) -->
  <rect x="50" y="140" width="298" height="110" fill="#21262d" stroke="#30363d" stroke-width="1" rx="6"/>
  <text x="68" y="168" fill="#e6edf3" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="bold">CLI Commands</text>
  <text x="68" y="188" fill="#8b949e" font-family="'Segoe UI', system-ui, sans-serif" font-size="12">run · crawl · report</text>
  <text x="68" y="206" fill="#8b949e" font-family="'Segoe UI', system-ui, sans-serif" font-size="12">serve · prune</text>
  <text x="68" y="226" fill="#8b949e" font-family="'Courier New', Courier, monospace" font-size="12">uv run jobfinder &lt;cmd&gt;</text>

  <!-- Card 2 — Config (y=264, height=100) -->
  <rect x="50" y="264" width="298" height="100" fill="#21262d" stroke="#30363d" stroke-width="1" rx="6"/>
  <text x="68" y="292" fill="#e6edf3" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="bold">Config</text>
  <text x="68" y="312" fill="#8b949e" font-family="'Segoe UI', system-ui, sans-serif" font-size="12">search_profiles.yaml</text>
  <text x="68" y="330" fill="#8b949e" font-family="'Segoe UI', system-ui, sans-serif" font-size="12">.env variables</text>

  <!-- Card 3 — Systemd Timer (y=378, height=100) -->
  <rect x="50" y="378" width="298" height="100" fill="#21262d" stroke="#30363d" stroke-width="1" rx="6"/>
  <text x="68" y="406" fill="#e6edf3" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="bold">Systemd Timer</text>
  <text x="68" y="426" fill="#8b949e" font-family="'Segoe UI', system-ui, sans-serif" font-size="12">jobfinder.timer</text>
  <text x="68" y="444" fill="#8b949e" font-family="'Segoe UI', system-ui, sans-serif" font-size="12">daily unattended runs</text>

  <!-- ===================== COLUMN 2 — CORE PIPELINE ===================== -->
  <!-- Column panel -->
  <rect x="400" y="96" width="380" height="460" fill="#161b22" stroke="#30363d" stroke-width="1.5" rx="10"/>
  <!-- Left accent bar -->
  <rect x="400" y="96" width="4" height="460" fill="#58a6ff" rx="2"/>
  <!-- Column header -->
  <text x="420" y="126" fill="#58a6ff" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="bold" letter-spacing="2">CORE PIPELINE</text>

  <!-- Large inner card -->
  <rect x="420" y="140" width="340" height="320" fill="#21262d" stroke="#30363d" stroke-width="1" rx="6"/>

  <!-- Row 1 — Adapters (blue bar, y=140 to y=220) -->
  <rect x="420" y="140" width="3" height="80" fill="#58a6ff" rx="1"/>
  <text x="440" y="172" fill="#58a6ff" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="bold">Adapters</text>
  <text x="440" y="192" fill="#8b949e" font-family="'Segoe UI', system-ui, sans-serif" font-size="12">16 source adapters · concurrent fetch</text>

  <!-- Divider after Row 1 -->
  <line x1="423" y1="220" x2="757" y2="220" stroke="#30363d" stroke-width="1"/>

  <!-- Row 2 — Normalize (no bar, y=220 to y=300) -->
  <text x="440" y="252" fill="#e6edf3" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="bold">Normalize</text>
  <text x="440" y="272" fill="#8b949e" font-family="'Segoe UI', system-ui, sans-serif" font-size="12">canonical schema · dedup · upsert</text>

  <!-- Divider after Row 2 -->
  <line x1="423" y1="300" x2="757" y2="300" stroke="#30363d" stroke-width="1"/>

  <!-- Row 3 — Score (green bar, y=300 to y=380) -->
  <rect x="420" y="300" width="3" height="80" fill="#3fb950" rx="1"/>
  <text x="440" y="332" fill="#3fb950" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="bold">Score</text>
  <text x="440" y="352" fill="#8b949e" font-family="'Segoe UI', system-ui, sans-serif" font-size="12">Rule (35%) · Embedding (30%) · LLM (35%)</text>

  <!-- Divider after Row 3 -->
  <line x1="423" y1="380" x2="757" y2="380" stroke="#30363d" stroke-width="1"/>

  <!-- Row 4 — Rank (orange bar, y=380 to y=460) -->
  <rect x="420" y="380" width="3" height="80" fill="#d29922" rx="1"/>
  <text x="440" y="412" fill="#d29922" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="bold">Rank</text>
  <text x="440" y="432" fill="#8b949e" font-family="'Segoe UI', system-ui, sans-serif" font-size="12">weighted composite · freshness bonus · top N</text>

  <!-- Ollama sub-card -->
  <rect x="420" y="478" width="340" height="60" fill="#21262d" stroke="#bc8cff" stroke-width="1" rx="6"/>
  <text x="440" y="503" fill="#bc8cff" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="bold">&#9881; Ollama</text>
  <text x="440" y="522" fill="#8b949e" font-family="'Segoe UI', system-ui, sans-serif" font-size="12">chat model · embed model (nomic-embed-text)</text>

  <!-- ===================== COLUMN 3 — OUTPUTS ===================== -->
  <!-- Column panel -->
  <rect x="820" y="96" width="330" height="400" fill="#161b22" stroke="#30363d" stroke-width="1.5" rx="10"/>
  <!-- Left accent bar -->
  <rect x="820" y="96" width="4" height="400" fill="#d29922" rx="2"/>
  <!-- Column header -->
  <text x="845" y="126" fill="#d29922" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="bold" letter-spacing="2">OUTPUTS</text>

  <!-- Card 1 — SQLite (y=140, height=110, stroke blue) -->
  <rect x="840" y="140" width="298" height="110" fill="#21262d" stroke="#58a6ff" stroke-width="1" rx="6"/>
  <text x="858" y="168" fill="#e6edf3" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="bold">SQLite</text>
  <text x="858" y="190" fill="#8b949e" font-family="'Segoe UI', system-ui, sans-serif" font-size="12">runs · jobs · versions · scores · alerts</text>
  <text x="858" y="210" fill="#8b949e" font-family="'Segoe UI', system-ui, sans-serif" font-size="12">job_versions · alerts · job_scores</text>

  <!-- Card 2 — File Artifacts (y=264, height=100, stroke orange) -->
  <rect x="840" y="264" width="298" height="100" fill="#21262d" stroke="#d29922" stroke-width="1" rx="6"/>
  <text x="858" y="292" fill="#e6edf3" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="bold">File Artifacts</text>
  <text x="858" y="312" fill="#8b949e" font-family="'Segoe UI', system-ui, sans-serif" font-size="12">raw snapshots (.json.gz)</text>
  <text x="858" y="330" fill="#8b949e" font-family="'Segoe UI', system-ui, sans-serif" font-size="12">FAISS index · reports (md/json)</text>

  <!-- Card 3 — Dashboard (y=378, height=100, stroke green) -->
  <rect x="840" y="378" width="298" height="100" fill="#21262d" stroke="#3fb950" stroke-width="1" rx="6"/>
  <text x="858" y="406" fill="#e6edf3" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="bold">Streamlit Dashboard</text>
  <text x="858" y="428" fill="#8b949e" font-family="'Courier New', Courier, monospace" font-size="12">jobfinder serve</text>

  <!-- ===================== ARROWS ===================== -->
  <!-- Arrow 1: Column 1 -> Column 2 (blue) -->
  <line x1="360" y1="326" x2="398" y2="326" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Arrow 2: Column 2 -> Column 3 (orange) -->
  <line x1="782" y1="326" x2="818" y2="326" stroke="#d29922" stroke-width="2" marker-end="url(#arr-orange)"/>

  <!-- Arrow 3: Ollama card bottom -> Column 2 big card bottom (purple dashed, upward) -->
  <line x1="590" y1="477" x2="590" y2="425" stroke="#bc8cff" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arr-purple)"/>

</svg>
